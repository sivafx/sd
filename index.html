<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="./icon.svg" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#121212" />
  <link rel="apple-touch-icon" href="./icon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shiva Canvas</title>

  <!-- Meta Tags for SEO -->
  <meta name="description"
    content="Shiva Canvas is a premium, web-based collaborative drawing board and diagram builder powered by Excalidraw, featuring templates, local storage, and custom workspace themes." />
  <meta name="keywords"
    content="drawing, whiteboard, diagram, flowchart, mindmap, wireframe, excalidraw, react, vite" />
  <meta name="author" content="Shiva Canvas Team" />

  <!-- Google Fonts (non-blocking async load) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=Nunito:wght@400;700&family=Lilita+One&display=swap"
    rel="stylesheet"
    media="print"
    onload="this.media='all'">
  <noscript>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=Nunito:wght@400;700&family=Lilita+One&display=swap" rel="stylesheet">
  </noscript>
  <!-- Polyfill for Excalidraw process.env references & CDN Assets Path -->
  <script>
    window.process = { env: { NODE_ENV: 'development' } };
    window.EXCALIDRAW_ASSET_PATH = window.location.port !== "" 
      ? "https://unpkg.com/@excalidraw/excalidraw@0.18.1/dist/dev/" 
      : "https://unpkg.com/@excalidraw/excalidraw@0.18.1/dist/prod/";
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="./src/main.jsx"></script>
</body>

</html>
